# Theme
remote_theme: "mmistakes/minimal-mistakes"

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-include-cache
title: "A Travel Broad"
description: "Wander with Kids. Plan Like a Pro. Fun, fully-researched family travel."
url: "https://nbmack21.github.io"
baseurl: ""
timezone: "America/Los_Angeles"
permalink: /:categories/:title/
minimal_mistakes_skin: "air"
minimal_mistakes_skin: "mint"
collections:
  destinations:
    output: true
    permalink: /destinations/:name/
defaults:
  - scope:
      path: ""
      type: destinations
    values:
      layout: single
      classes: wide


